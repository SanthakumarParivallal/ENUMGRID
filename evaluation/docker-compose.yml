# Deterministic evaluation testbed for EnumGrid.
#
# Brings up service containers at FIXED IPs on an isolated bridge network, so the
# set of live hosts AND their open ports/services/CVEs is known exactly — the
# ground truth (evaluation/ground_truth.json) for measuring detection
# precision/recall and confirming there are no false positives.
#
# Images are PINNED (not :latest) so the ground truth is reproducible run-to-run.
# One host (172.28.0.11) deliberately runs a known-vulnerable Apache 2.4.49 so
# that CVE *detection recall* can be measured against a planted, documented CVE.
#
#   docker compose up -d
#   # host discovery (precision/recall of the live-host set):
#   python benchmark.py 172.28.0.0/24 \
#       --ground-truth 172.28.0.10,172.28.0.11,172.28.0.12,172.28.0.13,172.28.0.14,172.28.0.15
#   # detection accuracy (ports / services / versions / planted CVE):
#   python detection_benchmark.py --md detection.md
#   docker compose down
#
# Device diversity is deliberate: two web servers (nginx/apache), an SSH server on a
# non-standard port (2222), a key-value store (redis), a relational database
# (postgres), AND a redis on a NON-STANDARD port (1999) to prove service detection
# follows the banner rather than the port number.
#
# Authorized by construction — you own these containers.

services:
  web-nginx:          # 172.28.0.10 — http (80), current/patched (no planted CVE)
    image: nginx:1.25.3-alpine
    networks:
      testbed:
        ipv4_address: 172.28.0.10

  web-apache:         # 172.28.0.11 — http (80), Apache 2.4.49: PLANTED CVE-2021-41773/42013
    image: httpd:2.4.49
    networks:
      testbed:
        ipv4_address: 172.28.0.11

  ssh-server:         # 172.28.0.12 — ssh (2222 -> sshd)
    image: linuxserver/openssh-server:version-9.3_p2-r0
    environment:
      - PUID=1000
      - PGID=1000
      - USER_NAME=test
    networks:
      testbed:
        ipv4_address: 172.28.0.12

  redis:              # 172.28.0.13 — redis (6379), current/patched (no planted CVE)
    image: redis:7.2.3-alpine
    networks:
      testbed:
        ipv4_address: 172.28.0.13

  db-postgres:        # 172.28.0.14 — postgresql (5432), relational-DB diversity
    image: postgres:14.2
    environment:
      - POSTGRES_PASSWORD=benchmark
    networks:
      testbed:
        ipv4_address: 172.28.0.14

  redis-nonstd:       # 172.28.0.15 — redis on a NON-STANDARD port (1999): the
    image: redis:7.2.3-alpine   # service must be identified by banner, not by port
    command: ["redis-server", "--port", "1999"]
    networks:
      testbed:
        ipv4_address: 172.28.0.15

networks:
  testbed:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
