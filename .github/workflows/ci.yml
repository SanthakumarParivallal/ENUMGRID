name: CI

# Full-stack gate: lint + the CLI engine, the FastAPI backend, and the React
# frontend each get their own job, run on every push and pull request.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}

jobs:
  lint:
    name: ruff (lint + import order)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Lint
        run: ruff check .

  security:
    name: security (bandit SAST + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit pip-audit
      - name: Bandit (static analysis)
        run: bandit -r purple_recon.py backend/ -c pyproject.toml
      - name: pip-audit (Python dependency CVEs)
        run: pip-audit -r backend/requirements.txt -r requirements-dev.txt

  cli:
    name: CLI pytest · py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Byte-compile (syntax gate)
        run: python -m py_compile purple_recon.py
      - name: CLI smoke test (--help loads cleanly)
        run: python purple_recon.py --help
      - name: Guardrail smoke test (loopback must be refused, exit 2)
        run: |
          set +e
          python purple_recon.py 127.0.0.1 --no-export >/dev/null 2>&1
          code=$?
          set -e
          test "$code" -eq 2 || { echo "expected exit 2, got $code"; exit 1; }
      # The CLI (purple_recon.py) is held at a full 100% line coverage. The
      # threaded engines, the orchestrator, both run-loops and the main()/cli()
      # entrypoints are driven through mocked boundaries (sockets, subprocess,
      # nmap, DNS), so a regression anywhere in the CLI fails the build.
      - name: Run CLI test suite (100% coverage gate, no regression)
        run: python -m pytest -v --cov=purple_recon --cov-report=term-missing --cov-fail-under=100
      - name: Evaluation harness unit tests (benchmark + detection + copilot scoring)
        run: python -m pytest evaluation/ -v
      - name: Accuracy gate — offline CVE matching (precision & recall == 1.0, no false CVE)
        run: python evaluation/cve_precision.py --min-precision 1.0 --min-recall 1.0

  backend:
    name: Backend pytest (FastAPI / scope guard / NSE parsing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run backend test suite (with coverage gate)
        working-directory: backend
        run: >
          python -m pytest -v
          tests/test_scanner.py tests/test_security.py tests/test_history.py tests/test_fingerprint.py
          tests/test_report.py tests/test_mdns.py tests/test_osfp.py tests/test_api.py tests/test_fuzz.py
          tests/test_golden.py tests/test_obs.py
          --cov=app --cov=scanner --cov=discovery --cov=security --cov=history
          --cov=report --cov=fingerprint --cov=mdns --cov=osfp --cov=models --cov=obs
          --cov-report=term --cov-fail-under=65

      # A total (100%) gate on EVERY backend module — the scan engine, the FastAPI
      # service, the scope/auth guardrails, the CVE matchers, and every parser /
      # persistence / integration module. Live-I/O paths (nmap, sockets, SSH, AWS,
      # LDAP, the LLM SDKs) are driven through mocked boundaries, so a regression
      # anywhere in the backend fails the build. The optional SDKs are installed in
      # CI (requirements-dev.txt) precisely so this gate is real, not a stub.
      - name: Coverage gate — all backend modules (100%, no regression)
        working-directory: backend
        run: >
          python -m pytest -q tests
          --cov=adscan --cov=app --cov=audit --cov=campaign --cov=cloudscan --cov=copilot
          --cov=credscan --cov=cve --cov=discovery --cov=fingerprint --cov=history --cov=jobs
          --cov=mdns --cov=models --cov=nbns --cov=notify --cov=obs --cov=osfp --cov=osv
          --cov=passive --cov=provenance --cov=report --cov=scanner --cov=schedule --cov=security
          --cov=snmp --cov=ssdp --cov=threatintel --cov=vulndb --cov=webscan
          --cov-report=term-missing --cov-fail-under=100

  frontend:
    name: Frontend (ESLint + Vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit shipped dependencies (dev tooling excluded)
        run: npm audit --omit=dev
      - name: Lint (ESLint — react-hooks + jsx-a11y)
        run: npm run lint
      # Vitest + a per-file 100% coverage gate on src/lib/** (the pure logic +
      # security layer: schema coercion, markdown/CSV escaping, auth, toast,
      # focus-trap, preferences, the offline engine) — the frontend peer of the
      # CLI/backend 100% line-coverage gate. Real DOM/timers, nothing faked.
      - name: Unit tests + coverage gate (src/lib at 100%)
        run: npm run coverage
      - name: Production build
        run: npm run build

  sbom:
    name: SBOM (CycloneDX — Python + npm dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Syft scans the repo (backend/requirements.txt + frontend/package-lock.json)
      # and emits one CycloneDX SBOM — the software bill of materials reviewers now
      # expect. Uploaded as a build artifact for release attach / vuln scanning.
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: enumgrid.sbom.cyclonedx.json
          artifact-name: enumgrid-sbom.cyclonedx.json
