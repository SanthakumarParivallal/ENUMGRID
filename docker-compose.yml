# EnumGrid — one-command deployment of the API + CLI image.
#
#   ENUMGRID_API_TOKEN=changeme docker compose up --build
#
# The frontend is a static SPA: build it once (`cd frontend && npm ci && npm run
# build`) and serve `frontend/dist/`, or use `make dev` for the live dev servers.
# The container below provides the part that needs nmap + the OS network tools.

services:
  enumgrid:
    build: .
    image: enumgrid
    # LAN device discovery needs the HOST network namespace (Linux): a bridged
    # container only sees its own subnet, not your real devices. On macOS/Windows
    # Docker Desktop, host networking is limited — prefer `make dev` there.
    network_mode: host
    environment:
      # With host networking the API binds the host's interfaces, but it is safe
      # by default: with NO token set it serves *local* clients only (loopback
      # peer + local Host header) and refuses LAN/remote callers. Set a token to
      # enable authenticated remote access (and front it with TLS).
      ENUMGRID_API_TOKEN: ${ENUMGRID_API_TOKEN:-}
      ENUMGRID_ALLOW_PUBLIC: ${ENUMGRID_ALLOW_PUBLIC:-}
      ENUMGRID_MAX_SCANS: ${ENUMGRID_MAX_SCANS:-4}
    volumes:
      # Persist scan history across runs.
      - enumgrid-data:/data
    restart: unless-stopped

volumes:
  enumgrid-data:
